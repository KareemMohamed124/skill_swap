<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Call</title>

    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }

        body{
        background:#000;
        width:100vw;
        height:100vh;
        overflow:hidden;
        font-family:sans-serif;
        }

        #remoteVideo{
        position:absolute;
        width:100%;
        height:100%;
        object-fit:cover;
        }

        #localVideo{
        position:absolute;
        top:20px;
        right:20px;
        width:180px;
        height:220px;
        object-fit:cover;
        border-radius:14px;
        border:2px solid rgba(255,255,255,.2);
        z-index:10;
        }

        #controls{
        position:absolute;
        bottom:30px;
        left:0;
        right:0;
        display:flex;
        justify-content:center;
        gap:20px;
        z-index:10;
        }

        button{
        width:60px;
        height:60px;
        border:none;
        border-radius:50%;
        background:rgba(255,255,255,.15);
        color:#fff;
        font-size:24px;
        cursor:pointer;
        }

        button.active{
        background:#6c63ff;
        }

        button.off{
        background:#666;
        }
    </style>
</head>

<body>

<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay playsinline muted></video>

<div id="controls">
    <button id="micBtn">🎤</button>
    <button id="camBtn">📷</button>
    <button id="screenBtn">🖥️</button>
</div>

<script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
    getFirestore,
    doc,
    setDoc,
    updateDoc,
    getDoc,
    collection,
    addDoc,
    onSnapshot
    }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

<!--  const firebaseConfig = {-->
<!--  apiKey: "AIzaSyBW555ItYCcgqhrr5yykce_It88xve92Ho",-->
<!--  authDomain: "skill-swap-e1a3d.firebaseapp.com",-->
<!--  projectId: "skill-swap-e1a3d",-->
<!--  storageBucket: "skill-swap-e1a3d.firebasestorage.app",-->
<!--  messagingSenderId: "450132003254",-->
<!--  appId: "1:450132003254:android:0e71a57fcc1a25297fd917"-->
<!--};-->

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const params = new URLSearchParams(location.search);

    const callId = params.get("callId");

    const currentUserId = params.get("userId");

    const callDoc = doc(db, "calls", callId);
const minutes = Number(params.get("minutes") || 0);

let remaining = minutes * 60;

const timer = setInterval(async () => {
    remaining--;

    if (remaining <= 0) {
        clearInterval(timer);

        try {
            await updateDoc(callDoc, {
                status: "ended",
                endedBy: "system"
            });
        } catch (e) {
            console.error(e);
        }
    }
}, 1000);
    const candColl =
    collection(db, "calls", callId, "candidates");

    // ================= SERVERS =================

    const servers = {
        iceServers: [

            {
                urls:[
                    "stun:stun.l.google.com:19302",
                    "stun:stun1.l.google.com:19302",
                    "stun:stun2.l.google.com:19302",
                    "stun:stun3.l.google.com:19302"
                ]
            },

            {
                urls:[
                    "turn:openrelay.metered.ca:80",
                    "turn:openrelay.metered.ca:443",
                    "turn:openrelay.metered.ca:443?transport=tcp"
                ],
                username:"openrelayproject",
                credential:"openrelayproject"
            }

        ],

        iceCandidatePoolSize:10
    };

    let pc = new RTCPeerConnection(servers);

    let localStream = null;

    let screenStream = null;

    let remoteSet = false;

    let pending = [];

    let mic = true;

    let cam = true;

    let screenSharing = false;

    // ================= INIT =================

    async function init(){

        localStream =
        await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:true
        });

        document.getElementById("localVideo").srcObject =
        localStream;

        localStream.getTracks().forEach(track=>{
            pc.addTrack(track, localStream);
        });

        pc.ontrack = (e)=>{

            const remoteVideo =
            document.getElementById("remoteVideo");

            if(!remoteVideo.srcObject){
                remoteVideo.srcObject = new MediaStream();
            }

            remoteVideo.srcObject.addTrack(e.track);
        };

        pc.onicecandidate = async (e)=>{

            if(!e.candidate) return;

            await addDoc(candColl,{
                candidate:e.candidate.candidate,
                sdpMid:e.candidate.sdpMid,
                sdpMLineIndex:e.candidate.sdpMLineIndex,
                senderId:currentUserId
            });
        };

        pc.oniceconnectionstatechange = async ()=>{

            console.log("ICE =>", pc.iceConnectionState);

            if(
                pc.iceConnectionState === "failed" ||
                pc.iceConnectionState === "disconnected"
            ){

                try{

                    const offer =
                    await pc.createOffer({
                        iceRestart:true
                    });

                    await pc.setLocalDescription(offer);

                    await updateDoc(callDoc,{
                        offer:{
                            sdp:offer.sdp,
                            type:offer.type
                        },
                        renegotiate:true
                    });

                }catch(e){
                    console.error(e);
                }
            }
        };

        await handleCallFlow();

        listenCall();

        listenCandidates();
    }

    // ================= CALL FLOW =================

    async function handleCallFlow(){

        let retries = 0;

        let snap = await getDoc(callDoc);

        while(
            (
                !snap.exists() ||
                !snap.data() ||
                !snap.data().offer
            )
            &&
            retries < 10
        ){

            await new Promise(r=>setTimeout(r,500));

            snap = await getDoc(callDoc);

            retries++;
        }

        // ================= HOST =================

        if(
            !snap.exists() ||
            !snap.data() ||
            !snap.data().offer
        ){

            console.log("I AM HOST");

            const offer = await pc.createOffer({
                offerToReceiveAudio:true,
                offerToReceiveVideo:true
            });

            await pc.setLocalDescription(offer);

            await setDoc(callDoc,{
                offer:{
                    sdp:offer.sdp,
                    type:offer.type
                },
                createdBy:currentUserId,
                createdAt:Date.now()
            },{merge:true});

            return;
        }

        // ================= JOINER =================

        const data = snap.data();

        if(data.createdBy === currentUserId){

            console.log("WAITING FOR ANSWER");

            return;
        }

        console.log("I AM JOINER");

        await pc.setRemoteDescription(
            new RTCSessionDescription(data.offer)
        );

        remoteSet = true;

        const answer = await pc.createAnswer({
            offerToReceiveAudio:true,
            offerToReceiveVideo:true
        });

        await pc.setLocalDescription(answer);

        await setDoc(callDoc,{
            answer:{
                sdp:answer.sdp,
                type:answer.type
            },
            joinedBy:currentUserId
        },{merge:true});
    }

    // ================= LISTEN CALL =================

    function listenCall(){

        onSnapshot(callDoc, async (snap)=>{

            const data = snap.data();

            if(!data) return;

            if(data.status === "ended"){

                cleanup();

                if(window.flutter_inappwebview){

                    window.flutter_inappwebview.callHandler(
                    "onCallEnded",
                    data.endedBy
                    );
                }

                return;
            }

            if(data.answer && !remoteSet){

                console.log("ANSWER RECEIVED");

                await pc.setRemoteDescription(
                    new RTCSessionDescription(data.answer)
                );

                remoteSet = true;

                for(const c of pending){
                    await pc.addIceCandidate(c);
                }

                pending = [];
            }

            if(
                data.renegotiate &&
                data.offer &&
                data.offer.type === "offer"
            ){

                console.log("RENEGOTIATION");

                await pc.setRemoteDescription(
                    new RTCSessionDescription(data.offer)
                );

                const answer = await pc.createAnswer();

                await pc.setLocalDescription(answer);

                await updateDoc(callDoc,{
                    answer:{
                        sdp:answer.sdp,
                        type:answer.type
                    },
                    renegotiate:false
                });
            }
        });
    }

    // ================= LISTEN ICE =================

    function listenCandidates(){

        onSnapshot(candColl,(snap)=>{

            snap.docChanges().forEach(async(change)=>{

                const data = change.doc.data();

                if(!data) return;

                if(data.senderId === currentUserId) return;

                const candidate = new RTCIceCandidate({
                    candidate:data.candidate,
                    sdpMid:data.sdpMid,
                    sdpMLineIndex:data.sdpMLineIndex
                });

                if(remoteSet){

                    await pc.addIceCandidate(candidate);

                }else{

                    pending.push(candidate);
                }

            });
        });
    }

    // ================= CLEANUP =================

    async function cleanup(){

        localStream?.getTracks().forEach(t=>t.stop());

        screenStream?.getTracks().forEach(t=>t.stop());

        pc.ontrack = null;

        pc.onicecandidate = null;

        pc.close();
    }

    // ================= MIC =================

    document.getElementById("micBtn").onclick = ()=>{

        mic = !mic;

        localStream.getAudioTracks().forEach(t=>{
            t.enabled = mic;
        });

        document
        .getElementById("micBtn")
        .classList.toggle("off", !mic);
    };

    // ================= CAM =================

    document.getElementById("camBtn").onclick = ()=>{

        cam = !cam;

        localStream.getVideoTracks().forEach(t=>{
            t.enabled = cam;
        });

        document
        .getElementById("camBtn")
        .classList.toggle("off", !cam);
    };

    // ================= SCREEN SHARE =================

    document.getElementById("screenBtn").onclick =
    async ()=>{

        const btn = document.getElementById("screenBtn");

        if(screenSharing){

            const camTrack =
            localStream.getVideoTracks()[0];

            const sender =
            pc.getSenders().find(s=>
            s.track?.kind === "video"
            );

            await sender.replaceTrack(camTrack);

            screenStream?.getTracks().forEach(t=>t.stop());

            screenSharing = false;

            btn.classList.remove("active");

        }else{

            screenStream =
            await navigator.mediaDevices.getDisplayMedia({
                video:true
            });

            const sender =
            pc.getSenders().find(s=>
            s.track?.kind === "video"
            );

            await sender.replaceTrack(
                screenStream.getVideoTracks()[0]
            );

            screenSharing = true;

            btn.classList.add("active");

            screenStream.getVideoTracks()[0].onended =
            ()=>{
                document.getElementById("screenBtn").click();
            };
        }

        const offer = await pc.createOffer();

        await pc.setLocalDescription(offer);

        await updateDoc(callDoc,{
            offer:{
                sdp:offer.sdp,
                type:offer.type
            },
            renegotiate:true
        });
    };

    // ================= START =================

    init();

</script>

</body>
</html>
